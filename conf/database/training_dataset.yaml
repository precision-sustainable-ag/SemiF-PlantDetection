# Configuration for generating training dataset from SQLite database

# Database settings
db_path: ${paths.db_path} # This will be inherited from paths config

# Training dataset settings
dataset:
  # Number of images to include in the training dataset
  size: 10
  
  # Class IDs to prioritize - these will be selected first
  # along with classes from latest batches from each growing season
  priority_species: [26]  # adding maize as a priority class
  
  # color_checker_id: 28
  # Ratios for selecting images from each group
  # should sum to 1.0
  ratios:
    priority_species: 0.6
    other_species: 0.3
    non_targets: 0.1
  
  # For priority species, images will be from recent batches for each growing season
  # For other species, let's add a mix of recent and older batches
  other_species_recency_ratio: 0.6

  # Minimum images per class (if available)
  # Currently only used for priority species (when getting min images)
  min_per_class: 0
  
  # Output path for dataset
  # TODO: add a timestamp to the output path (like outputs)
  output_path: ${paths.data_dir}/data_csvs
  
  # Random seed for reproducibility
  random_seed: 42 