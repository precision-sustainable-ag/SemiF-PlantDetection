# Configuration for generating training dataset from SQLite database

# Database settings
db_path: ${paths.sql_database} # This will be inherited from paths config

# Training dataset settings
dataset:
  # Number of images to include in the training dataset
  size: 1000
  
  # Class IDs to prioritize - these will be selected first
  priority_class_ids: [23, 24, 25]
  
  # Percentage of dataset to be filled with priority classes (0.0-1.0)
  priority_ratio: 0.6
  
  # Minimum images per class (if available)
  min_per_class: 50
  
  # Output path for dataset
  output_path: ${paths.data_dir}/training_dataset
  
  # Random seed for reproducibility
  random_seed: 42 